<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>AI Course RAG Agent</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 8px;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      cursor: pointer;
    }

    pre {
      background: #f5f5f5;
      padding: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
    }

    .section {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h1>AI Course RAG Agent</h1>

  <div class="section">
    <h2>1. 上传课程资料</h2>
    <input type="file" id="fileInput" />
    <br />
    <button onclick="uploadFile()">上传文件</button>
    <pre id="uploadResult"></pre>
  </div>

  <div class="section">
    <h2>2. 向 Agent 提问</h2>
    <textarea id="messageInput" placeholder="例如：根据我上传的 OS 笔记解释 syscall 是什么"></textarea>
    <br />
    <button onclick="askAgent()">提问</button>
  </div>

  <div class="section">
    <h2>3. 答案</h2>
    <pre id="answerResult"></pre>
  </div>

  <div class="section">
    <h2>4. 检索到的上下文 / 工具结果</h2>
    <pre id="toolResult"></pre>
  </div>

  <div class="section">
    <h2>5. Agent Trace</h2>
    <pre id="traceResult"></pre>
  </div>

  <script>
    async function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const output = document.getElementById("uploadResult");

      if (!fileInput.files.length) {
        output.textContent = "请先选择一个文件。";
        return;
      }

      const formData = new FormData();
      formData.append("file", fileInput.files[0]);

      const response = await fetch("/upload_file", {
        method: "POST",
        body: formData
      });

      const data = await response.json();
      output.textContent = JSON.stringify(data, null, 2);
    }

    async function askAgent() {
      const message = document.getElementById("messageInput").value;
      const answerResult = document.getElementById("answerResult");
      const toolResult = document.getElementById("toolResult");
      const traceResult = document.getElementById("traceResult");

      if (!message.trim()) {
        answerResult.textContent = "请输入问题。";
        return;
      }

      answerResult.textContent = "思考中...";
      toolResult.textContent = "";
      traceResult.textContent = "";

      const response = await fetch("/agent", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: message
        })
      });

      const data = await response.json();

      answerResult.textContent = data.answer || data.error || "";
      toolResult.textContent = JSON.stringify(data.tool_result || data.contexts || null, null, 2);
      traceResult.textContent = JSON.stringify(data.trace || data, null, 2);
    }
  </script>
</body>
</html>
